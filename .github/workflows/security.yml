# =============================================================================
# ZOE Security Workflow — Dependency & Code Security Scanning
# =============================================================================
# Triggers: semanal (cron lunes 08:00 UTC), push a main/development, y manual
# Objetivo: Ejecutar pip-audit para vulnerabilidades en dependencias y
# bandit para análisis estático de seguridad del código Python.
# =============================================================================

name: Security Scan

on:
  # Trigger semanal: lunes a las 08:00 UTC
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main, development]
  pull_request:
    branches: [main]
  # Trigger manual desde la UI de GitHub Actions
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job de auditoría de dependencias con pip-audit
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit Dependency Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Cache pip
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements.txt', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      # 4. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[test,advanced]"

      # 5. Ejecutar pip-audit con sarif output
      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
          output: pip-audit-results.sarif
          format: sarif
          # No fallar el build, solo reportar
          require-hashes: false

      # 6. Upload SARIF results a GitHub Security tab
      - name: Upload pip-audit SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit-results.sarif
          category: pip-audit

  # ---------------------------------------------------------------------------
  # Job de análisis estático de seguridad con bandit
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Cache pip
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-bandit-

      # 4. Instalar bandit
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]>=1.7.0

      # 5. Ejecutar bandit con salida SARIF
      # Sprint 5.15 F1.6: Eliminado '|| true' que hacia que bandit NUNCA fallara CI.
      # Ahora bandit falla CI si encuentra vulnerabilidades HIGH o CRITICAL (-ll).
      # Si hay findings LOW/MEDIUM, se suben al Security tab pero no fallan CI.
      - name: Run bandit security scan
        run: |
          bandit \
            -r zoe/ \
            -f sarif \
            -o bandit-results.sarif \
            --exclude './zoe/tests/*,./.venv/*,./venv/*' \
            -ll

      # 6. Upload SARIF results a GitHub Security tab
      - name: Upload bandit SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ---------------------------------------------------------------------------
  # Job resumen de seguridad (depende de los dos anteriores)
  # ---------------------------------------------------------------------------
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [pip-audit, bandit]
    if: always()

    steps:
      - name: Security scan completed
        run: |
          echo "========================================"
          echo "   Security Scan Summary for ZOE"
          echo "========================================"
          echo "pip-audit result: ${{ needs.pip-audit.result }}"
          echo "bandit result:    ${{ needs.bandit.result }}"
          echo ""
          echo "Revisa la pestaña 'Security' del repositorio"
          echo "para ver los resultados detallados en formato SARIF."
