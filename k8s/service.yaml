apiVersion: v1
kind: Service
metadata:
  name: zoe
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: organism
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: organism
  ports:
    - name: http
      port: 8642
      targetPort: http
      protocol: TCP
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
