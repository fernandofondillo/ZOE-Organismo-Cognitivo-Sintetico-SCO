# Sprint 5.18 F4.2 — HorizontalPodAutoscaler para ZOE.
#
# NOTA IMPORTANTE: ZOE es STATEFUL (identidad, memoria, trayectoria en PVC RWO).
# Con replicas: 1 (configuracion actual), HPA no escalara horizontalmente
# porque el PVC RWO solo se puede montar en 1 nodo.
#
# Este HPA esta preparado para cuando ZOE migre a StatefulSet con PVC por
# replica + federacion epistémica (Fase 5 del roadmap). Mientras tanto,
# el HPA no hara nada (minReplicas: 1, maxReplicas: 1) pero esta listo
# para cuando la arquitectura lo soporte.
#
# Aplicar con: kubectl apply -f k8s/horizontal-pod-autoscaler.yaml
# Requiere metrics-server instalado en el cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zoe-hpa
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: organism
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zoe
  # Sprint 5.18 F4.2: min=1, max=1 mientras ZOE es stateful con PVC RWO.
  # Cuando migre a StatefulSet + federacion: cambiar maxReplicas a 3-5.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    # CPU: escalar si > 70% de uso
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memoria: escalar si > 80% de uso
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
