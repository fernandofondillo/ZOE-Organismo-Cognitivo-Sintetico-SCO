apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoe
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: organism
    app.kubernetes.io/version: "1.0"
spec:
  # Sprint 5.15 F1.3: 1 réplica (NO 2).
  # ZOE es STATEFUL: identidad, memoria, trayectoria viven en PVC RWO.
  # 2 réplicas compartiendo PVC RWO es inviable (RWO = ReadWriteOnce = 1 nodo).
  # Para HA real, migrar a StatefulSet con PVC por réplica + federación epistémica.
  replicas: 1
  strategy:
    type: Recreate  # Recreate (no RollingUpdate) porque PVC RWO no se puede compartir
  selector:
    matchLabels:
      app.kubernetes.io/name: zoe
      app.kubernetes.io/component: organism
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zoe
        app.kubernetes.io/component: organism
        app.kubernetes.io/version: "1.0"
      annotations:
        # Sprint 5.15 F1.4: Helm template syntax NO funciona en Kustomize.
        # Para rollout restart en ConfigMap changes, usar Reloader
        # (https://github.com/stakater/Reloader) con la annotation:
        #   configmap.reloader.stakater.com/reload: "zoe-config"
        # O kubectl rollout restart deployment/zoe tras cambiar el configmap.
        configmap.reloader.stakater.com/reload: "zoe-config"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zoe-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - zoe
                topologyKey: kubernetes.io/hostname

      initContainers:
        # Init container: esperar a que PostgreSQL este listo
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z zoe-postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

        # Init container: esperar a que Ollama este listo
        - name: wait-for-ollama
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -qO- http://zoe-ollama:11434/api/tags > /dev/null 2>&1; do
                echo "Waiting for Ollama..."
                sleep 3
              done
              echo "Ollama is ready"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: zoe
          # Sprint 5.15 F1.1: Image path real del registry CI (ghcr.io)
          # y imagePullPolicy: Always para :latest tags.
          # El CI hace push a ghcr.io/fernandofondillo/zoe-organismo-cognitivo-sintetico-sco:vX.Y.Z
          image: ghcr.io/fernandofondillo/zoe-organismo-cognitivo-sintetico-sco:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8642
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: zoe-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zoe-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          # Probes
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30  # 5 * 30 = 150s max startup
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Volumen para datos persistentes (SQLite fallback)
            - name: zoe-data
              mountPath: /data/zoe
            # Volumen tmp para archivos temporales
            - name: tmp
              mountPath: /tmp
            # Configuracion embebida
            - name: config
              mountPath: /app/config
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Graceful shutdown: saving memory state..."
                    wget -qO- http://localhost:8080/ready || true
                    sleep 5

      volumes:
        - name: zoe-data
          persistentVolumeClaim:
            claimName: zoe-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: config
          configMap:
            name: zoe-config
            items:
              - key: production.yaml
                path: production.yaml

      terminationGracePeriodSeconds: 60
