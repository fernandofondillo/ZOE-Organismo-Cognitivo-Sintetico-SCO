apiVersion: v1
kind: Secret
metadata:
  name: zoe-secrets
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # PostgreSQL - Cambiar en produccion
  POSTGRES_PASSWORD: "change-me-in-production"

  # API Keys - Descomentar y configurar segun sea necesario
  # OPENAI_API_KEY: ""
  # TELEGRAM_BOT_TOKEN: ""
  # ANTHROPIC_API_KEY: ""

  # JWT / Encryption secrets
  # ZOE_JWT_SECRET: ""
  # ZOE_ENCRYPTION_KEY: ""

---
# NOTA: En produccion, usar un External Secrets Operator o similar
# para sincronizar secretos desde un vault externo (AWS Secrets Manager,
# Azure Key Vault, HashiCorp Vault, etc.)
#
# Ejemplo con External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: zoe-postgres-password
#   namespace: zoe
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     kind: ClusterSecretStore
#     name: aws-secrets-manager
#   target:
#     name: zoe-secrets
#     creationPolicy: Merge
#   data:
#     - secretKey: POSTGRES_PASSWORD
#       remoteRef:
#         key: /production/zoe/postgres
#         property: password
