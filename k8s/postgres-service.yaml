apiVersion: v1
kind: Service
metadata:
  name: zoe-postgres
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zoe-postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  # No publicar endpoints para que solo pods del namespace puedan acceder
  publishNotReadyAddresses: false
