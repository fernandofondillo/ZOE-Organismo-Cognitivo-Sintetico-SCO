apiVersion: v1
kind: ServiceAccount
metadata:
  name: zoe-sa
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zoe-role
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: rbac
rules:
  # Solo lectura de configmaps y secrets propios (para hot-reload)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["zoe-config"]
    verbs: ["get", "list", "watch"]
  # Health/readiness probes
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zoe-rolebinding
  namespace: zoe
  labels:
    app.kubernetes.io/name: zoe
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: zoe-sa
    namespace: zoe
roleRef:
  kind: Role
  name: zoe-role
  apiGroup: rbac.authorization.k8s.io
